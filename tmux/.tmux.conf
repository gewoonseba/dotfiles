# tmux configuration

# --- Basic Quality of Life ---

# Enable mouse support (scrolling, selecting, resizing)
set -g mouse on

# Truecolor support (24-bit color)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Increase scrollback history limit
set -g history-limit 100000

# Fast escape-time for responsiveness (e.g. in Vim/Neovim)
set -sg escape-time 10

# Automatically update client terminal title
set -g set-titles on
set -g set-titles-string "#S: #W"

# --- Keybindings ---

# Easily reload tmux config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Intuitive pane splits (opens in the current pane's directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Design & Aesthetics ---

# Machine-local theme overrides live outside the repo. Example:
#   set -g @tmux_status_accent "colour110"
# Use any tmux color name such as colour110, blue, green, magenta, or '#87afd7'.
set -g @tmux_status_accent "colour110"
source-file -q ~/.tmux.local.conf

# Refresh status line every 5 seconds
set -g status-interval 5

# Transparent / Terminal background for status bar
set -g status-style bg=default,fg=colour245

# Left status: active session name styled as a pill/badge
set -g status-left-length 40
set -g status-left "#[fg=colour235,bg=#{@tmux_status_accent},bold] #S #[bg=default,fg=#{@tmux_status_accent}] "

# Right status: host, date, and time
set -g status-right-length 80
set -g status-right "#[fg=colour240] %Y-%m-%d #[fg=colour245]│ #[fg=colour245,bold]%H:%M #[fg=#{@tmux_status_accent},bg=default] #[fg=colour235,bg=#{@tmux_status_accent},bold] #h "

# Window tab formatting (inactive windows)
set -g window-status-separator " "
set -g window-status-format "#[fg=colour244,bg=colour236] #I: #W "

# Active window tab formatting
set -g window-status-current-format "#[fg=colour235,bg=#{@tmux_status_accent},bold] #I: #W "

# Pane border styling
set -g pane-border-style fg=colour238
set -g pane-active-border-style "fg=#{@tmux_status_accent}"

# Message and command prompt styling
set -g message-style "bg=colour236,fg=#{@tmux_status_accent},bold"
